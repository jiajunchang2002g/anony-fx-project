services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: payment_platform
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment -d payment_platform"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: payment_platform
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: "local-development-secret-key-please-change"
    ports:
      - "8080:8080"
