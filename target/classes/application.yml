spring:
  application:
    name: multi-currency-payment-platform
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:payment_platform}
    username: ${POSTGRES_USER:payment}
    password: ${POSTGRES_PASSWORD:payment}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:multi-currency-payment-platform-secret-key-change-me-please-32+chars}
    expiration-minutes: 120
  financial:
    scale: 6
    rounding-mode: HALF_UP
  fx:
    base-currency: SGD
    cache-ttl-seconds: 3600
  bank:
    shared-secret: ${BANK_SHARED_SECRET:bank-shared-secret-change-me}
